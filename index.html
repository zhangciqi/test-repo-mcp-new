<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 游戏</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- 标题区域 -->
        <header class="header">
            <h1 class="title">2048</h1>
            <div class="scores">
                <div class="score-box">
                    <div class="score-label">SCORE</div>
                    <div class="score-value" id="current-score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">BEST</div>
                    <div class="score-value" id="best-score">0</div>
                </div>
            </div>
        </header>

        <!-- 操作提示 -->
        <p class="instructions" id="instructions">使用方向键 ↑ ↓ ← → 移动方块</p>

        <!-- 游戏网格区域 -->
        <div class="game-container" id="game-container">
            <div class="grid-background" id="grid-background">
                <!-- 16个空格格子 -->
            </div>
            <div class="tile-container" id="tile-container">
                <!-- 动态生成的方块 -->
            </div>
        </div>

        <!-- 新游戏按钮 -->
        <button class="new-game-btn" id="new-game-btn">新游戏</button>
    </div>

    <!-- 胜利遮罩层 -->
    <div class="game-overlay" id="win-overlay">
        <div class="overlay-content">
            <h2>恭喜！你赢了！</h2>
            <div class="overlay-buttons">
                <button class="overlay-btn" id="retry-btn">再来一局</button>
                <button class="overlay-btn continue-btn" id="continue-btn">继续游戏</button>
            </div>
        </div>
    </div>

    <!-- 失败遮罩层 -->
    <div class="game-overlay" id="gameover-overlay">
        <div class="overlay-content">
            <h2>游戏结束！</h2>
            <p class="final-score">最终得分：<span id="final-score">0</span></p>
            <button class="overlay-btn" id="restart-btn">重新开始</button>
        </div>
    </div>

    <script src="js/game.js?v=2"></script>
</body>
</html>
